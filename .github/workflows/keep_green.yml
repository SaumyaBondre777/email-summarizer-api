name: Keep GitHub History Green

on:
  schedule:
    # Runs automatically every day at 12:00 PM UTC
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to manually trigger this from the Actions tab

jobs:
  make-contribution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          # Use your primary GitHub account email so it links to your profile calendar
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create empty commit
        run: |
          git commit --allow-empty -m "Chore: Daily automated upkeep commit"

      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
